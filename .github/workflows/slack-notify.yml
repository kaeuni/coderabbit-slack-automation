name: Slack Notification Workflow

on:
  # [1] PR 생성 시 작동 (단체 채널 알림용)
  # [3] PR에 라벨(ready-for-review)이 붙었을 때 작동 (단체 채널 알림용)
  # [4] PR이 병합(Closed/Merged)되었을 때 작동 (단체 채널 알림용)
  pull_request:
    types: [opened, labeled, closed]

  # [2] CodeRabbit의 정식 리뷰 제출을 감지 (개인 DM 알림용)
  pull_request_review:
    types: [submitted]

jobs:
  slack-notifications:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: "C0BHJV049EF"
    steps:
      - name: Notify PR Opened to Channel
        uses: actions/github-script@v7
        with:
          script: |
            const escape = (text) =>
              text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : "";

            const postSlack = async (channel, text) => {
              await fetch("https://slack.com/api/chat.postMessage", {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${process.env.SLACK_BOT_TOKEN}`,
                  "Content-Type": "application/json; charset=utf-8"
                },
                body: JSON.stringify({ channel, text })
              });
            };

            const slackUsers = {
              "kaeuni": "U0BJK02GEMN"
            };

            const eventName = context.eventName;
            const action = context.payload.action;
            const pr = context.payload.pull_request || null;
            const channel = process.env.SLACK_CHANNEL;

            console.log("=== 이벤트 수신 ===");
            console.log("eventName:", eventName);
            console.log("action:", action);
            console.log("pr number:", pr ? pr.number : null);
            if (eventName === "pull_request_review") {
              console.log("review.user.login:", context.payload.review.user.login);
              console.log("review.state:", context.payload.review.state);
            }
            if (eventName === "pull_request" && action === "labeled") {
              console.log("label.name:", context.payload.label.name);
            }
            if (eventName === "pull_request" && action === "closed") {
              console.log("pr.merged:", pr ? pr.merged : null);
            }

            // [1] PR 생성 -> 단체 채널 알림
            if (eventName === "pull_request" && action === "opened" && pr) {
              console.log("[1] PR 생성 알림 발송");
              const safeTitle = escape(pr.title);
              await postSlack(
                channel,
                `🚀 *PR 생성*\n*작성자:* ${pr.user.login}\nPR: <${pr.html_url}|${safeTitle}>\n리뷰 부탁드립니다. 🙏`
              );
            }

            // [2] CodeRabbit 정식 리뷰 완료 -> 작성자 개인 1:1 DM
            else if (
              eventName === "pull_request_review" &&
              action === "submitted" &&
              context.payload.review.user.login === "coderabbitai[bot]" &&
              pr
            ) {
              console.log("[2] CodeRabbit 리뷰 완료 감지, DM 대상 확인 중");
              const prAuthor = pr.user.login;
              const slackId = slackUsers[prAuthor];
              if (!slackId) {
                console.log(`[2] slackUsers에 "${prAuthor}" 매핑이 없어 DM 스킵`);
                return;
              }

              console.log(`[2] DM 발송 대상: ${prAuthor} (${slackId})`);
              const safeTitle = escape(pr.title);
              await postSlack(
                slackId,
                `🤖 *CodeRabbit 리뷰 완료*\n\nPR: <${pr.html_url}|${safeTitle}>\n리뷰가 완료되었습니다. 수정사항 확인 후 반영해주세요! 🚀`
              );
            }

            // [3] ready-for-review 라벨 추가 -> 단체 채널 알림
            else if (
              eventName === "pull_request" &&
              action === "labeled" &&
              context.payload.label.name === "ready-for-review" &&
              pr
            ) {
              console.log("[3] ready-for-review 라벨 알림 발송");
              const safeTitle = escape(pr.title);
              await postSlack(
                channel,
                `🔍 *리뷰 요청*\n*작성자:* ${pr.user.login}\nPR: <${pr.html_url}|${safeTitle}>\n수정을 완료했습니다. 검토 부탁드립니다! ✨`
              );
            }

            // [4] PR 병합 완료 -> 단체 채널 알림
            else if (
              eventName === "pull_request" &&
              action === "closed" &&
              pr &&
              pr.merged === true
            ) {
              console.log("[4] PR 병합 완료 알림 발송");
              const safeTitle = escape(pr.title);
              await postSlack(
                channel,
                `🎉 *PR 병합 완료*\n*작성자:* ${pr.user.login}\nPR: <${pr.html_url}|${safeTitle}>\n성공적으로 병합되었습니다! 고생하셨습니다. 🥳`
              );
            }

            // 어떤 조건에도 해당하지 않는 이벤트
            else {
              console.log("[스킵] 조건에 맞는 케이스가 없어 알림을 보내지 않습니다.");
            }